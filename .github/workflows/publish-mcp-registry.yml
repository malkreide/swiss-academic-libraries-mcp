name: Publish to MCP Registry

# Listet den Server in der offiziellen MCP Registry (registry.modelcontextprotocol.io).
# Voraussetzungen (erfüllt): server.json im Repo-Root, `mcp-name`-Kommentar im README,
# PyPI-Paket veröffentlicht. Authentifizierung via GitHub OIDC — kein Secret nötig,
# die Namespace-Ownership `io.github.malkreide/*` wird über die OIDC-Identität belegt.
#
# Läuft automatisch bei jedem veröffentlichten GitHub-Release und kann für ein bereits
# veröffentlichtes Release manuell via "Run workflow" (workflow_dispatch) angestossen werden.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC-Authentifizierung gegenüber der MCP Registry
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
